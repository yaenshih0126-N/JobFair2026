<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DHL 閃電分揀員 - 專業打櫃版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #FFCC00; /* DHL 黃 */
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
            height: 100dvh; 
            width: 100vw;
            margin: 0;
        }
        .dhl-red { color: #D40000; }
        .bg-dhl-red { background-color: #D40000; }
        
        #game-container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding-top: 5px;
        }

        #music-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid #D40000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            font-size: 1.4rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #work-area {
            flex-grow: 1;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 40;
            overflow: hidden;
        }

        /* 導引箭頭樣式 */
        .guide-arrow {
            position: absolute;
            font-size: 3.5rem;
            font-weight: 900;
            color: rgba(212, 0, 0, 0.35);
            pointer-events: none;
            z-index: 10;
        }

        .arrow-left { 
            left: 25%; 
            top: 52%;
            transform: rotate(-135deg); 
            animation: bounce-diag-left 1.2s infinite; 
        }
        @keyframes bounce-diag-left {
            0%, 100% { transform: rotate(-135deg) translateY(0); opacity: 0.3; }
            50% { transform: rotate(-135deg) translateY(15px); opacity: 0.7; }
        }

        .arrow-right { 
            right: 25%; 
            top: 52%;
            transform: rotate(135deg); 
            animation: bounce-diag-right 1.2s infinite; 
        }
        @keyframes bounce-diag-right {
            0%, 100% { transform: rotate(135deg) translateY(0); opacity: 0.3; }
            50% { transform: rotate(135deg) translateY(15px); opacity: 0.7; }
        }

        /* 手指引導動畫 */
        #hand-tutorial {
            position: absolute;
            bottom: 35%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            z-index: 200;
            pointer-events: none;
            animation: swipe-tutorial 2.5s infinite ease-in-out;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        @keyframes swipe-tutorial {
            0% { transform: translateX(-50%) translateY(0); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: translateX(-120%) translateY(20px) rotate(-20deg); }
            50% { transform: translateX(-50%) translateY(0); }
            70% { transform: translateX(20%) translateY(20px) rotate(20deg); }
            90% { opacity: 1; }
            100% { transform: translateX(-50%) translateY(0); opacity: 0; }
        }

        .package {
            width: 220px; 
            min-height: 160px; 
            background: #FFCC00; 
            border: 3px solid #333; 
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1); 
            z-index: 100;
            padding: 10px;
            text-align: center;
            pointer-events: auto;
        }

        .package::after {
            content: '';
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            height: 6px;
            background: #D40000; 
            border-top: 1.5px solid #333;
            border-bottom: 1.5px solid #333;
        }

        .label-area {
            background: white;
            border: 2px solid #333;
            border-radius: 6px;
            padding: 10px;
            width: 95%;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
            z-index: 10;
        }

        footer {
            height: 180px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 10px 10px 10px;
            z-index: 30;
        }

        .pallet-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 46%;
        }

        .pallet-container {
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.4);
            border: 3px solid #D40000;
            border-top: none;
            border-radius: 0 0 10px 10px;
            display: flex;
            flex-direction: column-reverse; 
            align-items: center;
            padding-bottom: 3px;
            overflow: hidden;
        }

        .stacked-box {
            width: 92%;
            height: 18px;
            background: #FFCC00; 
            border: 1px solid #333;
            margin-bottom: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
            color: #D40000;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .pallet-label {
            width: 100%;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 900;
            color: #D40000;
            font-size: 0.85rem;
            line-height: 1.2;
            background: white;
            padding: 5px 8px;
            border: 2px solid #D40000;
            border-radius: 10px;
            margin-bottom: 4px;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        #timer-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 5px;
            background: #D40000;
            width: 100%;
            z-index: 200;
            transition: width 0.1s linear;
        }

        #explanation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            padding: 20px;
        }

        .hidden { display: none !important; }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <div id="timer-bar"></div>
    <div id="music-toggle">🔇</div>

    <div id="game-container">
        <!-- 開始畫面 -->
        <div id="start-screen" class="w-full h-full flex flex-col items-center justify-center p-6 z-[200] absolute bg-[#FFCC00]">
            <h1 class="text-4xl font-black dhl-red mb-1 italic text-center">DHL EXPRESS</h1>
            <h2 class="text-xl font-bold mb-8 text-gray-800">專業打櫃挑戰賽</h2>
            <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-xs w-full text-center border-4 border-black">
                <div class="w-16 h-12 bg-[#FFCC00] mx-auto mb-6 border-2 border-black relative flex items-center justify-center rounded">
                    <span class="font-black text-red-600 italic text-md">DHL</span>
                </div>
                <p class="text-base text-gray-700 mb-8 font-bold leading-relaxed text-left">
                    📏 <b>規則說明：</b><br>
                    1. 觀察包裹上的問題。<br>
                    2. 依據正確答案<b class="dhl-red text-lg">向左滑</b>投入A櫃，<b class="dhl-red text-lg">向右滑</b>投入B櫃。<br>
                    3. 挑戰在 30 秒內完美打櫃！
                </p>
                <button id="start-btn" class="w-full bg-dhl-red text-white py-4 rounded-2xl text-xl font-bold shadow-[0_5px_0_#990000] active:translate-y-1 active:shadow-none">
                    啟動任務
                </button>
            </div>
        </div>

        <!-- 遊戲主畫面 -->
        <div id="game-play" class="hidden flex flex-col h-full w-full">
            <header>
                <div class="text-gray-600 font-bold text-[10px] uppercase tracking-widest">Efficiency Score</div>
                <div id="score" class="text-3xl font-black dhl-red">0</div>
            </header>

            <div id="work-area">
                <!-- 指向櫃子的精準 45 度箭頭 -->
                <div class="guide-arrow arrow-left">↑</div>
                <div class="guide-arrow arrow-right">↑</div>
                <!-- 指示手指 (只在教學時顯示) -->
                <div id="hand-tutorial" class="hidden">☝️</div>
            </div>

            <footer>
                <div class="pallet-wrap">
                    <div id="left-label" class="pallet-label">A</div>
                    <div id="left-pallet" class="pallet-container"></div>
                </div>
                <div class="pallet-wrap">
                    <div id="right-label" class="pallet-label">B</div>
                    <div id="right-pallet" class="pallet-container"></div>
                </div>
            </footer>
        </div>

        <!-- 答案解析畫面 -->
        <div id="explanation-overlay" class="hidden">
            <div class="bg-white w-full max-w-sm rounded-3xl border-4 border-black p-6 shadow-2xl">
                <div id="result-indicator" class="text-2xl font-black mb-3 italic">CORRECT!</div>
                <div class="h-1 bg-gray-100 mb-4"></div>
                <p id="explanation-text" class="text-gray-700 text-sm font-medium leading-relaxed mb-6"></p>
                <button id="next-task-btn" class="w-full bg-dhl-red text-white py-4 rounded-xl font-black text-lg shadow-[0_4px_0_#990000] active:translate-y-1 active:shadow-none">
                    下一個貨件
                </button>
            </div>
        </div>

        <!-- 結算畫面 -->
        <div id="result-screen" class="hidden w-full h-full flex flex-col items-center justify-center p-6 z-[300] absolute bg-[#FFCC00]">
            <h2 class="text-3xl font-black dhl-red mb-4 italic text-center">任務完成！</h2>
            <div class="bg-white p-6 rounded-3xl shadow-2xl max-w-xs w-full text-center border-4 border-black">
                <p class="text-xs text-gray-600 font-bold uppercase tracking-wider">裝載效率總分</p>
                <div id="final-score" class="text-6xl font-black mb-2 dhl-red">0</div>
                <p id="rank-text" class="text-lg font-bold text-yellow-600 mb-4"></p>
                
                <p class="text-sm font-bold text-gray-800 bg-yellow-100 py-2 px-3 rounded-lg mb-6 border border-yellow-300 text-center">
                    🎁 註：出示此頁面給工作人員，即可兌換小禮物！
                </p>
                
                <button onclick="window.location.reload()" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold mb-3 shadow-[0_4px_0_#333] active:translate-y-1 active:shadow-none">再挑戰一次</button>
                <button id="join-team-btn" class="w-full bg-dhl-red text-white py-3 rounded-xl font-bold shadow-[0_4px_0_#990000] active:translate-y-1 active:shadow-none">加入 DHL 卓越團隊</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "DHL是在哪裡成立的？", left: "A. 舊金山 (San Francisco)", right: "B. 台北 (Taipei)", correct: "left", desc: "DHL於1969年在舊金山成立，於1973年進入台灣，並在台北設立總公司。" },
            { q: "DHL 主要的業務核心是？", left: "A. 專業國際物流服務", right: "B. 全台連鎖外送點餐平台", correct: "left", desc: "DHL致力於提供高品質國際物流，連結全球貿易並引領永續發展。"},
            { q: "DHL 品牌名稱的由來？", left: "A. Deliver Happiness and Love", right: "B. 三位創辦人的姓氏首字縮寫", correct: "right", desc: "DHL為Adrian Dalsey, Larry Hillblom和Robert Lynn三位創辦人的姓氏縮寫。" },
            { q: "DHL 的集團目標為？", left: "A. 2030年全面啟用電動車隊", right: "B. 2050年達成淨零碳排目標", correct: "right", desc: "DHL提倡GoGreen，集團目標在2050年達成淨零碳排，目前也已推出永續物流的相關服務。" },
            { q: "DHL 的品牌主色調？", left: "A.藍色配綠色 ", right: "B. 黃色配紅色", correct: "right", desc: "金黃色象徵DHL的速度，紅色則代表熱情，為DHL的經典品牌色。" }
        ];

        let score = 0, timeLeft = 30, gameActive = false, timerPaused = false, questionIndex = 0;
        let currentPackage = null, startX = 0, isFirstSwipe = true;

        let audioCtx = null, isMusicPlaying = false, nextNoteTime = 0, beat = 0;
        const tempo = 175;

        async function unlockAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            const buffer = audioCtx.createBuffer(1, 1, 22050);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start(0);
        }

        const musicBtn = document.getElementById('music-toggle');
        
        musicBtn.addEventListener('click', () => toggleMusic());
        musicBtn.addEventListener('touchstart', unlockAudio, { passive: true });

        function toggleMusic(force = null) {
            isMusicPlaying = force !== null ? force : !isMusicPlaying;
            musicBtn.innerText = isMusicPlaying ? "🔊" : "🔇";
            if (isMusicPlaying) {
                nextNoteTime = audioCtx.currentTime;
                scheduler();
            }
        }

        function playKick(time) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(120, time);
            osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.12);
            g.gain.setValueAtTime(0.4, time);
            g.gain.exponentialRampToValueAtTime(0.01, time + 0.12);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(time); osc.stop(time + 0.12);
        }

        function playSynth(time, freq, dur) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, time);
            g.gain.setValueAtTime(0.06, time);
            g.gain.exponentialRampToValueAtTime(0.001, time + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(time); osc.stop(time + dur);
        }

        function scheduler() {
            while (isMusicPlaying && nextNoteTime < audioCtx.currentTime + 0.1) {
                const step = beat % 4;
                if (step === 0) playKick(nextNoteTime);
                const freq = [130, 155, 174, 196][step];
                playSynth(nextNoteTime, freq, 0.1);
                nextNoteTime += 60.0 / tempo;
                beat++;
            }
            if (isMusicPlaying) setTimeout(scheduler, 25);
        }

        const startBtn = document.getElementById('start-btn');
        const nextTaskBtn = document.getElementById('next-task-btn');
        const workArea = document.getElementById('work-area');
        const scoreDisplay = document.getElementById('score');
        const joinBtn = document.getElementById('join-team-btn');

        startBtn.addEventListener('click', async () => {
            await unlockAudio();
            startGame();
        });
        startBtn.addEventListener('touchstart', unlockAudio, { passive: true });

        nextTaskBtn.addEventListener('click', hideExplanation);
        
        joinBtn.addEventListener('click', () => {
            window.open("https://careers.dhl.com/global/en", "_blank");
        });

        function startGame() {
            toggleMusic(true);
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-play').classList.remove('hidden');
            gameActive = true;
            spawnQuestion();
            startTimer();
        }

        function startTimer() {
            const tb = document.getElementById('timer-bar');
            const itv = setInterval(() => {
                if (!gameActive) { clearInterval(itv); return; }
                if (!timerPaused) {
                    timeLeft -= 0.1;
                    tb.style.width = (timeLeft / 30 * 100) + '%';
                    if (timeLeft <= 0) endGame();
                }
            }, 100);
        }

        function spawnQuestion() {
            if (!gameActive || questionIndex >= questions.length) return;
            const data = questions[questionIndex];
            document.getElementById('left-label').innerText = data.left;
            document.getElementById('right-label').innerText = data.right;

            // 顯示引導手指 (僅在第一題)
            const handTut = document.getElementById('hand-tutorial');
            if (questionIndex === 0 && isFirstSwipe) {
                handTut.classList.remove('hidden');
            } else {
                handTut.classList.add('hidden');
            }

            const pkg = document.createElement('div');
            pkg.className = 'package';
            pkg.innerHTML = `<div class="label-area"><div class="text-base font-black text-gray-800 leading-tight">${data.q}</div></div>`;
            workArea.appendChild(pkg);
            currentPackage = pkg;

            const handleStart = (x) => { 
                unlockAudio(); 
                startX = x; 
                if (isFirstSwipe) {
                    handTut.classList.add('hidden');
                }
            };
            const handleMove = (x) => {
                if (!currentPackage || timerPaused) return;
                const diff = x - startX;
                currentPackage.style.transform = `translateX(${diff}px) rotate(${diff/15}deg)`;
            };
            const handleEnd = (x) => {
                if (!currentPackage || timerPaused) return;
                const diff = x - startX;
                if (diff < -60) {
                    isFirstSwipe = false;
                    validate('left');
                } else if (diff > 60) {
                    isFirstSwipe = false;
                    validate('right');
                } else {
                    currentPackage.style.transition = '0.3s';
                    currentPackage.style.transform = 'translateX(0) rotate(0)';
                }
            };

            pkg.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX), {passive: true});
            pkg.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e.touches[0].clientX); }, {passive: false});
            pkg.addEventListener('touchend', (e) => handleEnd(e.changedTouches[0].clientX));
            pkg.addEventListener('mousedown', (e) => {
                handleStart(e.clientX);
                const onMM = (me) => handleMove(me.clientX);
                const onMU = (ue) => {
                    handleEnd(ue.clientX);
                    window.removeEventListener('mousemove', onMM);
                    window.removeEventListener('mouseup', onMU);
                };
                window.addEventListener('mousemove', onMM);
                window.addEventListener('mouseup', onMU);
            });
        }

        function validate(choice) {
            const data = questions[questionIndex];
            const isCorrect = choice === data.correct;
            timerPaused = true; 

            if (isCorrect) {
                score += 20;
                currentPackage.style.transition = '0.4s';
                currentPackage.style.transform = `translate(${choice === 'left' ? -200 : 200}px, 200px) scale(0)`;
                setTimeout(() => addBox(choice), 300);
            } else {
                score = Math.max(0, score - 10);
                currentPackage.style.transition = '0.5s';
                currentPackage.style.transform = `translateY(400px)`;
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 400);
            }
            scoreDisplay.innerText = score;
            showExp(isCorrect, data.desc);
        }

        function showExp(isCorrect, text) {
            const ind = document.getElementById('result-indicator');
            ind.innerText = isCorrect ? "正確！" : "錯誤...";
            ind.className = isCorrect ? "text-2xl font-black mb-2 text-green-600" : "text-2xl font-black mb-2 text-red-600";
            document.getElementById('explanation-text').innerText = text;
            setTimeout(() => document.getElementById('explanation-overlay').classList.remove('hidden'), 500);
        }

        function hideExplanation() {
            document.getElementById('explanation-overlay').classList.add('hidden');
            if (currentPackage) currentPackage.remove();
            questionIndex++;
            timerPaused = false;
            if (questionIndex >= questions.length) endGame();
            else spawnQuestion();
        }

        function addBox(side) {
            const b = document.createElement('div');
            b.className = 'stacked-box';
            b.innerText = `📦 OK`;
            (side === 'left' ? document.getElementById('left-pallet') : document.getElementById('right-pallet')).appendChild(b);
        }

        function endGame() {
            gameActive = false;
            isMusicPlaying = false; 
            document.getElementById('game-play').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            let rank = score >= 100 ? "🏆 超級打櫃大師" : (score >= 60 ? "🚚 優秀物流專家" : "📦 理貨練習生");
            document.getElementById('rank-text').innerText = rank;
        }
    </script>
</body>
</html>
